server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect XML sitemaps to backend API (URL baked at build time via sed)
    location = /sitemap.xml {
        return 301 __BACKEND_URL__/api/sitemap.xml;
    }

    location = /news-sitemap.xml {
        return 301 __BACKEND_URL__/api/news-sitemap.xml;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
