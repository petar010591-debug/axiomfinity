server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for proxy_pass with variables (required for runtime resolution)
    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;

    # Proxy sitemap requests directly to backend API (no redirect, same origin)
    location = /sitemap.xml {
        set $sitemap_upstream "__BACKEND_URL__/api/sitemap.xml";
        proxy_pass $sitemap_upstream;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Accept "application/xml";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location = /news-sitemap.xml {
        set $news_sitemap_upstream "__BACKEND_URL__/api/news-sitemap.xml";
        proxy_pass $news_sitemap_upstream;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Accept "application/xml";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
