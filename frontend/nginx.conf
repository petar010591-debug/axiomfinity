map $http_user_agent $is_social_bot {
    default                     0;
    ~*Twitterbot                1;
    ~*facebookexternalhit       1;
    ~*LinkedInBot               1;
    ~*WhatsApp                  1;
    ~*TelegramBot               1;
    ~*Slackbot                  1;
    ~*Discordbot                1;
    ~*Embedly                   1;
    ~*Pinterest                 1;
    ~*vkShare                   1;
    ~*redditbot                 1;
    ~*CoinMarketCap             1;
    ~*Quora                     1;
    ~*outbrain                  1;
}

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for proxy_pass with variables
    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;

    # --- XML feeds proxied to backend ---
    location = /sitemap.xml {
        set $sitemap_upstream "__BACKEND_URL__/api/sitemap.xml";
        proxy_pass $sitemap_upstream;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Accept "application/xml";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location = /news-sitemap.xml {
        set $news_sitemap_upstream "__BACKEND_URL__/api/news-sitemap.xml";
        proxy_pass $news_sitemap_upstream;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Accept "application/xml";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location = /rss.xml {
        set $rss_upstream "__BACKEND_URL__/api/rss.xml";
        proxy_pass $rss_upstream;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Accept "application/rss+xml";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location = /rss/quality.xml {
        set $rss_quality_upstream "__BACKEND_URL__/api/rss/quality.xml";
        proxy_pass $rss_quality_upstream;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Accept "application/rss+xml";
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # --- OG meta for social bots on article URLs (/{category}/{slug}) ---
    location ~ ^/([a-z0-9-]+)/([a-z0-9-]+)$ {
        set $og_upstream "__BACKEND_URL__/api/og/$1/$2";

        if ($is_social_bot) {
            proxy_pass $og_upstream;
        }

        try_files $uri /index.html;
    }

    # --- Default SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
